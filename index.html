<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sharkie</title>

    <!-- Embdedding Favicon -->
    <link rel="icon" type="image/png" href="src/favicon/fav.png" />

    <!-- Embedding CSS -->
    <link rel="stylesheet" href="src/css/base.css" />
    <link rel="stylesheet" href="src/css/style.css" />

    <!-- Embedding JavaScript -->
    <script type="module" src="src/js/script.js"></script>
  </head>
  <body>
    <div class="fullscreen-container">
      <canvas id="canvas" width="720px" height="480px"></canvas>

      <div class="overlay active">
        <div class="startScreen flex-center background active">
          <h1>Sharki</h1>
          <button id="btn-start" type="button">Start</button>
          <button id="btn-controls" type="button">Controls</button>
          <button type="button"><a href="impressum.html">Impressum</a></button>
        </div>
        <div class="controls background flex-center">
          <table>
            <tr>
              <td>
                <div class="key">W</div>
                <div class="key">&#9650;</div>
              </td>
              <td>UP</td>
            </tr>
            <tr>
              <td>
                <div class="key">D</div>
                <div class="key">&#9654;</div>
              </td>
              <td>RIGHT</td>
            </tr>
            <tr>
              <td>
                <div class="key">S</div>
                <div class="key">&#9660;</div>
              </td>
              <td>DOWN</td>
            </tr>
            <tr>
              <td>
                <div class="key">A</div>
                <div class="key">&#9664;</div>
              </td>
              <td>RIGHT</td>
            </tr>
            <tr>
              <td>
                <div class="key">H</div>
              </td>
              <td>SHOOT</td>
            </tr>
          </table>
          <button id="back" type="button">Back</button>
        </div>
        <div class="endScreen flex-center">
          <h2 id="result-text"></h2>
          <button id="home" type="button">Home</button>
          <button id="replay" type="button">Replay</button>
        </div>
        <div class="head-line">
          <button type="button">
            <img class="btn-screen" src="./src/icons/fullscreen.png" />
          </button>

          <button type="button">
            <img class="btn-sound" src="./src/icons/mute.png" />
          </button>
        </div>
        <div class="control-container">
          <div class="control-left">
            <svg class="control-image" viewBox="0 -960 960 960">
              <path
                d="M480-634Zm154 154Zm-307 0Zm153 153Zm0-224L369-663v-217h223v217L480-551Zm183 182L551-480l112-112h217v223H663Zm-583 0v-223h217l112 112-112 111H80ZM369-80v-217l111-112 112 112v217H369Zm111-554 52-52v-134H429v134l51 52ZM140-429h135l52-51-52-52H140v103Zm289 289h103v-135l-52-52-51 52v135Zm257-289h134v-103H686l-52 52 52 51Z"
              />
            </svg>
            <div class="row">
              <button class="control-button" id="btn-control-up-left">
                &middot;
              </button>
              <button class="control-button" id="btn-control-up"></button>
              <button class="control-button" id="btn-control-up-right">
                &middot;
              </button>
            </div>
            <div class="row row2">
              <button class="control-button" id="btn-control-left"></button>
              <button class="control-button" id="btn-control-right"></button>
            </div>
            <div class="row">
              <button class="control-button" id="btn-control-down-left">
                &middot;
              </button>
              <button class="control-button" id="btn-control-down"></button>
              <button class="control-button" id="btn-control-down-right">
                &middot;
              </button>
            </div>
          </div>
          <div class="control-right">
            <button class="control-button" id="btn-control-sprint">
              <svg viewBox="0 -960 960 960" class="sprint_icon">
                <path
                  d="m216-160-56-56 384-384H440v80h-80v-160h233q16 0 31 6t26 17l120 119q27 27 66 42t84 16v80q-62 0-112.5-19T718-476l-40-42-88 88 90 90-262 151-40-69 172-99-68-68-266 265Zm-96-280v-80h200v80H120ZM40-560v-80h200v80H40Zm739-80q-33 0-57-23.5T698-720q0-33 24-56.5t57-23.5q33 0 57 23.5t24 56.5q0 33-24 56.5T779-640Zm-659-40v-80h200v80H120Z"
                />
              </svg>
            </button>
            <button class="control-button" id="btn-control-attack">
              <svg viewBox="0 -960 960 960" class="attack_icon">
                <path
                  d="M762-96 645-212l-88 88-28-28q-23-23-23-57t23-57l169-169q23-23 57-23t57 23l28 28-88 88 116 117q12 12 12 28t-12 28l-50 50q-12 12-28 12t-28-12Zm118-628L426-270l5 4q23 23 23 57t-23 57l-28 28-88-88L198-96q-12 12-28 12t-28-12l-50-50q-12-12-12-28t12-28l116-117-88-88 28-28q23-23 57-23t57 23l4 5 454-454h160v160ZM334-583l24-23 23-24-23 24-24 23Zm-56 57L80-724v-160h160l198 198-57 56-174-174h-47v47l174 174-56 57Zm92 199 430-430v-47h-47L323-374l47 47Zm0 0-24-23-23-24 23 24 24 23Z"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
